kind = "web"
previewPath = "/"
title = "MLBB Guide PH"
version = "1.0.0"
id = "artifacts/mlbb-guide"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20666

[services.development]
run = "pnpm --filter @workspace/mlbb-guide run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mlbb-guide", "run", "build" ]
publicDir = "artifacts/mlbb-guide/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20666"
BASE_PATH = "/"
